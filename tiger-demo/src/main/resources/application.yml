server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    connection-timeout: 20000

spring:
  profiles:
    active: ${env-flag} # 默认启动开发环境

springdoc:
  api-docs:
    path: /v3/api-docs
  paths-to-exclude: /actuator/**, /error/**

tiger:
  knife4j:
    enable: true
    setting:
      language: zh_cn
      enable-swagger-models: true
      enable-document-manage: true
      enable-version: true
  mail:
    smtpHost: smtp.mxhichina.com
    smtpPort: 465
    smtpUser:
    smtpPwd:
    senderName: tiger
    smtpSslEnable: true
  log:
    aspect: true